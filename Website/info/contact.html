<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Contact Us — Mentone Educational</title><link rel="stylesheet" href="../../css/tokens.css"><link rel="stylesheet" href="../../css/global.css"><link rel="stylesheet" href="../../css/layout.css"><link rel="stylesheet" href="../../css/components.css"></head>
<body><div id="site-header"></div>
<main><div class="container" style="padding:var(--space-12) 0;">
  <h1 style="font-size:var(--font-size-3xl);font-weight:var(--font-weight-bold);margin-bottom:var(--space-3);">Contact Us</h1>
  <p style="color:var(--color-text-muted);margin-bottom:var(--space-10);">We're here to help. Our team of product experts is available Monday–Friday, 9am–5pm AEST.</p>
  <div style="display:grid;grid-template-columns:1fr 360px;gap:var(--space-12);">
    <div>
      <div style="display:flex;flex-direction:column;gap:var(--space-5);">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4);">
          <div class="form-group"><label class="form-label">First Name</label><input type="text" class="form-input" placeholder="Jane"></div>
          <div class="form-group"><label class="form-label">Last Name</label><input type="text" class="form-input" placeholder="Smith"></div>
        </div>
        <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" placeholder="jane@hospital.com.au"></div>
        <div class="form-group"><label class="form-label">Phone (optional)</label><input type="tel" class="form-input" placeholder="04XX XXX XXX"></div>
        <div class="form-group"><label class="form-label">Subject</label><select class="form-select"><option>General Enquiry</option><option>Product Question</option><option>Order Issue</option><option>Quote Request</option><option>Returns</option></select></div>
        <div class="form-group"><label class="form-label">Message</label><textarea class="form-textarea" placeholder="How can we help?"></textarea></div>
        <button class="btn btn-primary btn-lg">Send Message</button>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:var(--space-5);">
      <div style="border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:var(--space-6);">
        <h3 style="font-weight:700;margin-bottom:var(--space-4);">📞 Phone</h3>
        <p style="font-size:var(--font-size-lg);font-weight:700;color:var(--color-primary);">(03) 9547 6638</p>
        <p style="font-size:var(--font-size-sm);color:var(--color-text-muted);">Mon–Fri 9am–5pm AEST</p>
      </div>
      <div style="border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:var(--space-6);">
        <h3 style="font-weight:700;margin-bottom:var(--space-4);">✉ Email</h3>
        <a href="mailto:sales@mentone-educational.com.au" style="font-size:var(--font-size-sm);color:var(--color-primary);">sales@mentone-educational.com.au</a>
        <p style="font-size:var(--font-size-sm);color:var(--color-text-muted);margin-top:var(--space-2);">We respond within 1 business day</p>
      </div>
      <div style="border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:var(--space-6);">
        <h3 style="font-weight:700;margin-bottom:var(--space-4);">📍 Showroom</h3>
        <p style="font-size:var(--font-size-sm);color:var(--color-text-muted);">Melbourne, Victoria, Australia<br>Visit by appointment</p>
      </div>
    </div>
  </div>
</div></main>
<div id="site-footer"></div><script src="../../js/shared.js"></script><script src="../../js/main.js"></script></body></html>
